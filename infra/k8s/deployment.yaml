apiVersion: apps/v1
kind: Deployment
metadata:
  name: kavach-backend
  namespace: kavach-ai
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: abisheik687/kavach-backend:v2.0
        ports:
        - containerPort: 8000
        resources:
          limits:
            cpu: "2"
            memory: "4Gi"
          requests:
            cpu: "1"
            memory: "2Gi"
        envFrom:
        - configMapRef:
            name: kavach-config
        - secretRef:
            name: kavach-secrets
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kavach-hpa
  namespace: kavach-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kavach-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
